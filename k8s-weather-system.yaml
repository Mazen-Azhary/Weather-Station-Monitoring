---
# Namespace (optional but recommended)
apiVersion: v1
kind: Namespace
metadata:
  name: weather-system

---
# PersistentVolumeClaim for shared storage (Parquet + Bitcask)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: weather-data-pvc
  namespace: weather-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
# ConfigMap for environment variables shared across services
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-config
  namespace: weather-system
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  WEATHER_TOPIC: "weather-readings"
  RAIN_ALERT_TOPIC: "raining-alerts"
  PARQUET_OUTPUT_PATH: "/data/parquet"
  BITCASK_DATA_DIR: "/data/bitcask"
  STATION_TYPE: "simulated"

---
# Zookeeper Deployment (version 7.4.0)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.4.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# Zookeeper Service
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: weather-system
spec:
  selector:
    app: zookeeper
  ports:
  - port: 2181
    targetPort: 2181

---
#Kafka Deployment (version 7.4.0 with dual listeners as in compose)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9092
        - containerPort: 29092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_LISTENERS
          value: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "INTERNAL://kafka:9092,EXTERNAL://kafka:29092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "INTERNAL"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        - name: KAFKA_NUM_PARTITIONS
          value: "10"
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"
        - name: KAFKA_HEAP_OPTS
          value: "-Xmx512m -Xms512m"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "168"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
        
---
#Kafka Service
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: weather-system
spec:
  selector:
    app: kafka
  ports:
  - name: internal
    port: 9092
    targetPort: 9092
  - name: external
    port: 29092          # 29092 بدلاً من 9094
    targetPort: 29092

---
# Elasticsearch Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "1.5Gi"
            cpu: "1"

---
# Elasticsearch Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: weather-system
spec:
  selector:
    app: elasticsearch
  ports:
  - port: 9200
    targetPort: 9200

---
# Kibana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.10.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5601
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch:9200"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
# Kibana Service (NodePort for browser access)
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: weather-system
spec:
  selector:
    app: kibana
  ports:
  - port: 5601
    targetPort: 5601
  type: NodePort

---
# Headless service required for StatefulSet
apiVersion: v1
kind: Service
metadata:
  name: weather-station-headless
  namespace: weather-system
spec:
  clusterIP: None
  selector:
    app: weather-station

---
# Weather Station StatefulSet (10 replicas, unique station_id from hostname)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weather-station
  namespace: weather-system
spec:
  serviceName: "weather-station-headless"
  replicas: 10
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
      - name: station
        image: weather-station:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: STATION_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name   # e.g., "weather-station-0" -> code extracts number and adds 1
        - name: KAFKA_BOOTSTRAP
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: STATION_TYPE
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: STATION_TYPE
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      restartPolicy: Always

---
# Central Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-server
  namespace: weather-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-server
  template:
    metadata:
      labels:
        app: central-server
    spec:
      containers:
      - name: server
        image: central-server:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: WEATHER_TOPIC
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: WEATHER_TOPIC
        - name: RAIN_ALERT_TOPIC
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: RAIN_ALERT_TOPIC
        - name: PARQUET_OUTPUT_PATH
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: PARQUET_OUTPUT_PATH
        - name: BITCASK_DATA_DIR
          valueFrom:
            configMapKeyRef:
              name: weather-config
              key: BITCASK_DATA_DIR
        volumeMounts:
        - name: weather-data
          mountPath: /data
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1"
      volumes:
      - name: weather-data
        persistentVolumeClaim:
          claimName: weather-data-pvc